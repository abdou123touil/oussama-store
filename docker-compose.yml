version: "3.9"

services:
  # 🔥 DATABASE
  db:
    image: mysql:8
    
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pos
    volumes:
      - db_data:/var/lib/mysql

  # 🔥 BACKEND
  backend:
    build: ./backend  # Vérifie bien que ton Dockerfile est dans ./backend et non ./backend/backend
    
    restart: always
    
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: pos
      JWT_SECRET: secret
    depends_on:
      - db

  # 🔥 FRONTEND
  frontend:
    build: ./frontend
    
   
    depends_on:
      - backend

volumes:
  db_data: